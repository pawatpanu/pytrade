user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/atom+xml image/svg+xml;

    # ============================================
    # Upstream PyTrade Services
    # ============================================
    upstream streamlit_backend {
        server streamlit-dashboard:8501;
    }

    upstream api_backend {
        server pytrade-daemon:5000;
    }

    # ============================================
    # HTTP Server (redirect to HTTPS)
    # ============================================
    server {
        listen 80;
        server_name _;

        location / {
            return 301 https://$host$request_uri;
        }

        # Allow .well-known for cert renewal
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
    }

    # ============================================
    # HTTPS Server (Main)
    # ============================================
    server {
        listen 443 ssl http2;
        server_name _;

        # Self-signed cert (for local use)
        # For production, use Let's Encrypt with Certbot
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        # SSL Configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security Headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval' *.streamlit.app data: blob:;" always;

        # ============================================
        # Root Location (redirect to dashboard)
        # ============================================
        location / {
            return 301 /dashboard/;
        }

        # ============================================
        # Streamlit Dashboard
        # ============================================
        location /dashboard/ {
            proxy_pass http://streamlit_backend/;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            proxy_buffering off;
            proxy_read_timeout 300s;
            proxy_connect_timeout 60s;
            
            # Streamlit specific
            proxy_pass_request_headers on;
            proxy_set_header Authorization $http_authorization;
        }

        # WebSocket for Streamlit
        location /dashboard/_stcore/stream {
            proxy_pass http://streamlit_backend/_stcore/stream;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_read_timeout 300s;
            proxy_buffering off;
        }

        # ============================================
        # API Endpoints
        # ============================================
        location /api/ {
            proxy_pass http://api_backend/;
            
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_read_timeout 30s;
            proxy_connect_timeout 10s;

            # CORS Headers
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, Authorization";

            if ($request_method = 'OPTIONS') {
                return 204;
            }
        }

        # ============================================
        # Static files (faster serving)
        # ============================================
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://streamlit_backend;
            
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # ============================================
        # Health Check
        # ============================================
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # ============================================
        # Metrics/Status
        # ============================================
        location /status {
            access_log off;
            stub_status on;
            allow 127.0.0.1;
            allow 172.16.0.0/12;  # Docker networks
            deny all;
        }

        # ============================================
        # 404 Handler
        # ============================================
        error_page 404 /404.html;
        location = /404.html {
            return 200 '{"error": "Not Found"}';
            add_header Content-Type application/json;
        }

        # ============================================
        # 50x Handler
        # ============================================
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            return 503 '{"error": "Service Unavailable"}';
            add_header Content-Type application/json;
        }
    }
}
